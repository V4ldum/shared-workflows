name: test flutter project
on:
    workflow_call:
        inputs:
            enabled:
                required: false
                type: boolean
                default: true
        secrets:
            ENV:
                required: false

jobs:
    run-tests:
        if: inputs.enabled
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: subosito/flutter-action@v2

            - name: Config Flutter
              run: flutter config --no-analytics --enable-web

            - name: Clean project
              run: flutter clean

            - name: Install dependencies
              run: flutter pub get

            - name: Create env file
              run: |
                  if [ -n "$ENV_SECRET" ]; then
                    echo "$ENV_SECRET" > .env
                  fi
              env:
                  ENV_SECRET: ${{ secrets.ENV }}

            - name: Rebuild generated code
              run: |
                  rm -rf .dart_tool
                  dart run build_runner build -d

            - name: Analyze project source
              run: dart analyze
