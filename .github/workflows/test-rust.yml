name: test rust project
on:
    workflow_call:
        inputs:
            enabled:
                required: false
                type: boolean
                default: true

jobs:
    run-tests:
        if: inputs.enabled
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Analyze project source
              run: cargo check --keep-going
